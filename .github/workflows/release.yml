name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test
      - name: Build
        run: cargo build --release
      # Inno Setup (iscc) is preinstalled on windows-latest (ADR 0027).
      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc /DAppVersion=$version installer\winremap.iss
      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Copy-Item target/release/winremap.exe dist/
          Copy-Item installer/output/winremap-setup.exe dist/
          # The bare exe is downloadable on its own, so the notice for the
          # embedded Bootstrap Icons has to be a release asset too (MIT).
          Copy-Item THIRD-PARTY-NOTICES.md dist/
          $sums = foreach ($name in "winremap.exe", "winremap-setup.exe") {
            $hash = (Get-FileHash dist/$name -Algorithm SHA256).Hash.ToLower()
            "$hash  $name"
          }
          $sums | Out-File -Encoding ascii dist/SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/winremap.exe
            dist/winremap-setup.exe
      # Draft on purpose: the owner reviews the notes and artifacts before
      # anything becomes publicly downloadable (docs/06_release-operations.md).
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/winremap.exe
            dist/winremap-setup.exe
            dist/SHA256SUMS
            dist/THIRD-PARTY-NOTICES.md
