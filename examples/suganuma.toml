# Personal config: fakeymacs-style Emacs bindings ported from Keyhac.
#
# Notes on the port:
# - IME control (Muhenkan/Henkan, A-BackQuote, C-Space, Emacs IME mode) is
#   out of winremap's scope; assign Muhenkan = IME off / Henkan = IME on in
#   the Windows 11 IME settings instead.
# - C-s is intentionally NOT remapped (kept as native Save), matching the
#   original skip_settings_key configuration.
# - C-k (kill-line) has no single-chord equivalent and is not ported.

# --- Emacs bindings everywhere, except apps with their own key handling ---
[[keymap]]
name = "emacs"
application = ["*"]
exclude = [
    # not_emacs_target equivalent
    "Illustrator.exe",
    "Photoshop.exe",
    "Adobe Premiere Pro.exe",
    "InDesign.exe",
    "WindowsTerminal.exe",
    "Zed.exe",
]

[keymap.remap]
# Cursor movement
"C-b" = "Left"
"C-f" = "Right"
"C-p" = "Up"
"C-n" = "Down"
"C-a" = "Home"
"C-e" = "End"
"C-v" = "PageDown"
"A-v" = "PageUp"
"A-b" = "C-Left"  # word backward
"A-f" = "C-Right" # word forward

# Editing
"C-h" = "Back"      # delete backward char (the reason this project exists)
"C-d" = "Delete"    # delete forward char
"A-Back" = "C-Back" # delete word backward
"A-d" = "C-Delete"  # delete word forward
"C-m" = "Enter"

# Kill/yank mapped to the OS clipboard
"C-w" = "C-x" # kill region -> cut
"A-w" = "C-c" # copy region -> copy
"C-y" = "C-v" # yank        -> paste

# Misc
"C-g" = "Esc" # keyboard-quit -> escape

# Custom commands ported from config_personal.py (macro outputs)
"C-t" = ["C-Right", "C-Left", "C-S-Right"] # select word
"C-o" = ["Enter", "Up", "End"]             # open line
"A-a" = ["C-Home", "C-S-End"]              # select all (was M-a)

# Function-key shortcuts (define_key2 in config_personal.py)
"C-2" = "F2"
"C-3" = "F3"
"C-4" = "F4"
"C-5" = "F5"

# Ctl-x prefix on A-x (fc.ctl_x_prefix_key = "A-x").
# Add the C-x bindings you actually use; the second stroke may be a chord.
"A-x h" = ["C-Home", "C-S-End"] # C-x h   : mark whole buffer
"A-x u" = "C-z"                 # C-x u   : undo
"A-x C-s" = "C-s"               # C-x C-s : save
"A-x C-f" = "C-o"               # C-x C-f : open file
"A-x k" = "C-F4"                # C-x k   : close document/tab

# --- Keep native browser shortcuts (emacs_exclusion_key equivalent) ---
# App-specific rules beat the global keymap, and an identity remap
# effectively passes the chord through to the browser.
[[keymap]]
name = "browser-native-keys"
application = ["chrome.exe", "msedge.exe", "firefox.exe"]

[keymap.remap]
"C-t" = "C-t" # keep: new tab (instead of select-word macro)
"C-w" = "C-w" # keep: close tab (instead of cut)

[[keymap]]
name = "acrobat-native-keys"
application = ["Acrobat.exe"]

[keymap.remap]
"C-w" = "C-w" # keep: close document
