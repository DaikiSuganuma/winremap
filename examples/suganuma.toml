# 個人設定: Keyhac + fakeymacs から移植した Emacs 風キーバインド。
#
# 移植メモ:
# - IME 制御（無変換/変換、A-BackQuote、C-Space、Emacs 日本語入力モード）は
#   WinRemap のスコープ外。Windows 11 の IME 設定で「無変換 = IME オフ /
#   変換 = IME オン」を割り当てて代替する。
# - C-s は元設定（skip_settings_key）どおり意図的にリマップしない
#   （ネイティブの保存のまま）。
# - C-k（kill-line）は単一コマンドで表現できないため未移植。

# --- マクロ機能設定 ---
[macro]
delay_ms = 8 # マクロの各打鍵の間隔（ms、0-15）。WinUI 系アプリの取りこぼし対策

# --- IME 状態インジケーター（リマップとは独立した表示機能） ---
# IME がオン（日本語入力）になった瞬間、アクティブウィンドウの中央に
# 半透明の「あ」パネルを約 0.8 秒表示して現在の入力モードを知らせる。
# 表示のみで IME の制御・切り替えは行わない。既定は無効（opt-in）。
# 仕様: docs/v0.1/02_config-spec.md §6 ／ 設計: docs/v0.1/05_ime-indicator-design.md
[ime_indicator]
enabled = true
# 切替の検知キー。変換/無変換・半角/全角などの標準 IME キーは既定で検知される。
# ここでは Windows 11 IME の「Ctrl + Space を使用して IME のオン/オフを
# 切り替える」オプションに合わせて C-Space を追加している（ADR 0021）。
trigger_keys = ["C-Space"] # 切替の検知キー
show_app_name = true # パネルの下に対象アプリの exe 名を表示（ADR 0024）


# --- 全アプリに Emacs バインドを適用（独自のキー処理を持つアプリは除外） ---
[[keymap]]
name = "Windows Emacs"
application = [
    "*" # 全アプリ。ここから除外するアプリはexclude で指定
]
exclude = [
    # not_emacs_target 相当
    "Illustrator.exe", # アドビイラストレーター
    "Photoshop.exe", # アドビフォトショップ
    "Adobe Premiere Pro.exe", # アドビプレミアプロ
    "InDesign.exe", # アドビインデザイン
    #"WindowsTerminal.exe",
    #"Zed.exe",
]

[keymap.remap]
# カーソル移動
"C-b" = "Left"
"C-f" = "Right"
"C-p" = "Up"
"C-n" = "Down"
"C-a" = "Home"
"C-e" = "End"

# 編集
"C-h" = "Back"      # 1 文字後退削除（このプロジェクトの発端）
"C-d" = "Delete"    # 1 文字前方削除

# その他
"C-g" = "Esc" # keyboard-quit → Esc
"A-f" = "C-f" # incremental search -> app find

# config_personal.py から移植したカスタムコマンド（マクロ出力）
"C-t" = ["C-Right", "C-Left", "C-S-Right"] # 単語選択（ネイティブ単一ショートカットが無いためマクロで合成）
"C-o" = ["Enter", "Up", "End"]             # 行を開く（open-line 相当）

# 全選択は Windows ネイティブの C-a をそのまま送る。注入イベントは再変換されない
# （不変条件 1）ため、上の物理 C-a→Home リマップとは衝突しない。
"A-a" = "C-a" # 全選択

# --- ブラウザはネイティブのショートカットを維持（emacs_exclusion_key 相当） ---
# アプリ別ルールはグローバルより優先されるため、恒等リマップで実質素通しになる。
[[keymap]]
name = "browser-native-keys"
application = ["chrome.exe", "msedge.exe", "firefox.exe"]

[keymap.remap]
"C-t" = "C-t" # 新しいタブを維持（単語選択マクロより優先）
"C-w" = "C-w" # タブを閉じるを維持（切り取りより優先）

[[keymap]]
name = "acrobat-native-keys"
application = ["acrobat.exe"]

[keymap.remap]
"C-w" = "C-w" # ドキュメントを閉じるを維持

# --- Windows Terminal / SSH で「空行 C-d → exit」を実現する ---
# Windows Terminal だけ C-d をネイティブに素通しし、シェル側の標準挙動に任せる。
[[keymap]]
name = "terminal-native-keys"
application = ["WindowsTerminal.exe", "zed.exe", "phpstorm64.exe"]

[keymap.remap]
"C-d" = "C-d" # 空行での EOF/exit を維持（bash・PSReadLine の DeleteCharOrExit 用）
#"C-k" = "C-k"
