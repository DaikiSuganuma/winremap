# winremap minimal example.
#
# Fixes Ctrl+H in the PHPStorm built-in terminal: sends a plain Backspace so
# terminal apps (e.g. Claude Code) delete one character instead of a word.
# Other applications are not affected.

[[keymap]]
name = "jetbrains-terminal-fix"
application = ["phpstorm64.exe"]

[keymap.remap]
"C-h" = "Back"
