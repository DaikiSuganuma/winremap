# WinRemap minimal example.
#
# Maps Ctrl+H to a plain Backspace, but only inside Notepad. Since Notepad's
# default Ctrl+H opens the Replace dialog, this doubles as an easy way to
# verify WinRemap is working: press Ctrl+H in Notepad and a character is
# deleted instead. Other applications are not affected.

[[keymap]]
name = "notepad"
application = ["notepad.exe"]

[keymap.remap]
"C-h" = "Back"
